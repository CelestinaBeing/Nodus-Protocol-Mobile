name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Integration tests require an Android emulator and take considerably longer
# than unit tests. They run in a separate job so that unit-test failures are
# reported quickly without waiting for the emulator to boot.
jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Integration tests require compiling the app to a native Android target.
      # stellar_flutter_sdk 1.8.1 and pinenacl 0.5.1 use Dart APIs
      # (encodingForCharset, UnmodifiableUint8ListView) that were removed in
      # Dart SDK >=3.5. Flutter 3.22.3 (Dart 3.4.x) is the highest stable
      # release that still compiles these transitive dependencies successfully
      # while also satisfying local_auth's >=3.16.6 constraint.
      # Bump this pin when stellar_flutter_sdk / pinenacl ship Dart 3.5+ fixes.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Generate Android platform files if not committed (CI-only step).
      - name: Generate Android platform
        run: flutter create . --platforms android

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: flutter test integration_test/ -d emulator-5554
