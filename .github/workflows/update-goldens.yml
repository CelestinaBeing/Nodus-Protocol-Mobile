name: Update Golden Baselines

on:
  workflow_dispatch:

jobs:
  update-goldens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Update golden baselines
        run: flutter test --tags golden --update-goldens

      - name: Commit updated goldens
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update golden baselines'
          file_pattern: 'test/**/goldens/*.png'
