name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Info-level messages (e.g. from updated flutter_lints) must not silently
      # break CI. --fatal-warnings keeps the signal-to-noise ratio useful while
      # still catching real problems.
      - name: Analyze
        run: flutter analyze --fatal-warnings

      # Unit tests only — golden tests are excluded so a pixel-level divergence
      # in a golden baseline cannot mask a real unit-test failure or suppress
      # the coverage report.
      - name: Unit Tests
        run: flutter test --exclude-tags golden --coverage

      # Golden tests run in isolation so that baseline mismatches are reported
      # clearly without affecting unit-test results or coverage output.
      # Exit code 79 means "no tests matched the tag" — treat as success so CI
      # stays green while baselines are being established.  Real test failures
      # (exit ≠ 0 and ≠ 79) still break the build.
      - name: Golden Tests
        shell: bash
        run: |
          EXIT=0
          flutter test --tags golden || EXIT=$?
          if [ "$EXIT" -eq 79 ]; then
            echo "No golden-tagged tests ran (exit 79) — skipping gracefully"
            exit 0
          fi
          exit "$EXIT"
