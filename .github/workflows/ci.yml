name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Unit Tests
        run: flutter test --exclude-tags golden --coverage

      - name: Golden Tests
        run: |
          if [ -z "$(find test -name '*.png' -path '*/goldens/*' 2>/dev/null)" ]; then
            echo "No golden baselines committed — skipping. Run the 'Update Golden Baselines' workflow to generate them."
            exit 0
          fi
          flutter test --tags golden
