name: nodus_protocol
description: Nodus Protocol — permissionless AMM DEX on Stellar Soroban
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Network
  graphql_flutter: ^5.1.2
  dio: ^5.4.0
  
  # Stellar
  stellar_flutter_sdk: ^1.8.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  
  # Utils
  intl: ^0.19.0
  decimal: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # FFI (Core Engine)
  ffi: ^2.1.0
  
  # Security
  local_auth: ^2.2.0
  biometric_storage: ^5.0.1
  
  # Analytics
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/tokens/
